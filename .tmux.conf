# control-j doesn't interfere with anything, and it's easy to type
set-option -g prefix C-j
unbind-key C-b
bind-key C-j send-prefix

# toggle MRU window
bind-key C-j last-window

# mouse scrolls buffer instead of shell commands
set-option -g mouse on
set-option -g history-limit 10000

# Enable vi keys in copy mode for better selection (optional but recommended; feels more natural)
set-window-option -g mode-keys vi

# Bind drag-end to copy selection directly to macOS clipboard (tmux 2.1+)
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Optional: Also bind 'y' key in copy mode to yank (copy) selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
